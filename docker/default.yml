services:
  postgres:
    image: library/postgres:18-alpine
    container_name: greedybear_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - ./env_file_postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]  
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 1s

  app:
    image: intelowlproject/greedybear:prod
    container_name: greedybear_app
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ../configuration/gunicorn/config.py:/etc/gunicorn/config.py
      - generic_logs:/var/log/greedybear
      - static_content:/opt/deploy/greedybear/static
      - gunicorn_sockets:/run/gunicorn
    entrypoint:
      - ./docker/entrypoint_gunicorn.sh
    command: ["gunicorn", "greedybear.wsgi:application", "-c", "/etc/gunicorn/config.py"]
    env_file:
      - env_file
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/gunicorn/main.sock && kill -0 $(cat /run/gunicorn/gunicorn.pid)"]
      interval: 10s
      timeout: 2s
      retries: 30
      start_period: 120s
      start_interval: 1s

  nginx:
    image: intelowlproject/greedybear_nginx:prod
    container_name: greedybear_nginx
    restart: unless-stopped
    volumes:
      - ../configuration/nginx/http.conf:/etc/nginx/conf.d/default.conf
      - ../configuration/nginx/errors.conf:/etc/nginx/errors.conf
      - ../configuration/nginx/locations.conf:/etc/nginx/locations.conf
      - nginx_logs:/var/log/nginx
      - static_content:/var/www/static
      - gunicorn_sockets:/run/gunicorn
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/ || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s
      start_interval: 1s


  qcluster:
    image: intelowlproject/greedybear:prod
    container_name: greedybear_qcluster
    restart: unless-stopped
    stop_grace_period: 3m
    entrypoint:
      - ./docker/entrypoint_qcluster.sh
    command: sh -c "python manage.py setup_schedules && exec python manage.py qcluster"
    volumes:
      - generic_logs:/var/log/greedybear
      - mlmodels:/opt/deploy/greedybear/mlmodels
    env_file:
      - env_file
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
  nginx_logs:
  generic_logs:
  static_content:
  mlmodels:
  gunicorn_sockets:
