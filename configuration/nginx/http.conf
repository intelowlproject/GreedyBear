# the upstream components nginx needs to connect to
upstream django_main {
    server unix:/run/gunicorn-main.sock fail_timeout=30s;
}

upstream django_health {
    server unix:/run/gunicorn-health.sock fail_timeout=5s;
}

uwsgi_cache_path /var/cache/nginx/feeds keys_zone=feeds_cache:10m max_size=10g
                 inactive=10m use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    server_tokens off;

    # Locations
    include locations.conf;

    location /static/ {
        alias /var/www/static/;
    }

    location ^~/admin {
        uwsgi_pass                  django_main;
        uwsgi_pass_header           Authorization;
        uwsgi_pass_request_headers  on;
        uwsgi_read_timeout          45;
        include                     uwsgi_params;
        client_max_body_size        20m;
    }

    location ~^/api/feeds {
        uwsgi_pass                  django_main;
        uwsgi_pass_header           Authorization;
        uwsgi_pass_request_headers  on;
        uwsgi_read_timeout          600;
        include                     uwsgi_params;

        gzip on;
        gzip_types application/json;
        gzip_min_length 1000;

        uwsgi_cache feeds_cache;
        uwsgi_cache_key $scheme$host$uri$is_args$args;
        uwsgi_cache_valid 200 10m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location / {
        uwsgi_pass                  django_main;
        uwsgi_pass_header           Authorization;
        uwsgi_pass_request_headers  on;
        uwsgi_read_timeout          45;
        include                     uwsgi_params;
        client_max_body_size        20m;
    }

    # Healthcheck endpoint, routed to dedicated uWSGI socket
    location = /hc {
        uwsgi_pass                  django_health;
        uwsgi_read_timeout          5;
        include                     uwsgi_params;
    }

    # Error pages
    include errors.conf;

}