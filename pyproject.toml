[project]
name = "greedybear"
version = "3.3.0"
requires-python = "==3.13.*"
dependencies = [
    # Django core
    "Django~=5.2",
    "djangorestframework~=3.16",
    "django-rest-email-auth~=5.0",
    "django-ses~=4.7",
    "django-q2~=1.9",
    "croniter~=6.0",
    "certego-saas~=0.7",
    # Server Gateway Interface
    "gunicorn~=25.1",
    # Data stores
    "elasticsearch~=9.3",
    "psycopg2-binary~=2.9",
    # ML / data science
    "scikit-learn~=1.8",
    "pandas~=3.0",
    "numpy~=2.4",
    "joblib~=1.5",
    "datasketch~=1.9",
    # File Format Support
    "feedparser~=6.0",
    "stix2~=3.0",
    # Utilities
    "requests~=2.33",
    "slack-sdk~=3.40",
]

[dependency-groups]
dev = [
    "coverage~=7.3.2",
    "django-test-migrations~=1.5.0",
    "django-watchfiles~=1.4.0",
]
lint = [
    "ruff~=0.12.7",
]

[tool.uv]
prerelease = "allow"
override-dependencies = ["markdown==3.10.2"]

[tool.ruff]
extend = ".github/configurations/python_linters/.ruff.toml"
